<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiveCaption</title>
  <style>
    /* Minimal companion UI — the real UI is on the glasses */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
    }
    .status {
      font-size: 14px;
      color: #7b7b7b;
      margin-bottom: 24px;
    }
    .status.connected { color: #4BB956; }
    .status.error { color: #FF453A; }
    .transcript-preview {
      width: 100%;
      max-width: 576px;
      background: #000;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      color: #4BB956;
      white-space: pre-wrap;
      min-height: 200px;
      overflow-y: auto;
    }
    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
    }
    button {
      background: #232323;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    .hint {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
      text-align: center;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <h1>LiveCaption</h1>
  <div class="status" id="status">Initializing...</div>
  <div class="transcript-preview" id="preview">Waiting for audio...</div>
  <div class="controls">
    <button id="btn-clear" onclick="clearTranscript()">Clear</button>
  </div>
  <div class="hint">
    Double-tap on glasses to pause/resume.<br>
    Transcript appears on your G2 display in real-time.
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
